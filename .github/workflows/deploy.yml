name: Deploy agent

on:
  push:
    branches: [main]
    paths:
      - agent.json
      - environment.json
      - hog-function.hog
      - setup.sh
      - system-prompt.md
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy agent, environment, and Hog function
        run: ./setup.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_FUNCTION_ID: ${{ secrets.POSTHOG_FUNCTION_ID }}
          AGENT_ID: ${{ secrets.AGENT_ID }}
          ENVIRONMENT_ID: ${{ secrets.ENVIRONMENT_ID }}
